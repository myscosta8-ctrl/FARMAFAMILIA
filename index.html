const SUPABASE_URL = "https://cseypzniovlxvujapxgv.supabase.co";
const SUPABASE_KEY = "sb_publishable_4yig9S3CCenfU7ff7HNtbQ_MztE4zfy";

const Sessao = {
  ler(){ try{ return JSON.parse(localStorage.getItem('sessao')) }catch{ return null } },
  gravar(s){ try{ localStorage.setItem('sessao', JSON.stringify(s)) }catch{} },
  limpar(){ try{ localStorage.removeItem('sessao') }catch{} },
};

async function entrar(email, senha){
  const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:senha})
  });
  const d = await r.json();
  if(!r.ok) throw new Error(d.error_description || d.msg || 'E-mail ou senha inválidos');
  Sessao.gravar({token:d.access_token, refresh:d.refresh_token, email:(d.user&&d.user.email)||email});
  return d;
}

async function renovarSessao(){
  const s = Sessao.ler(); if(!s || !s.refresh) return false;
  const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({refresh_token:s.refresh})
  });
  if(!r.ok) return false;
  const d = await r.json();
  Sessao.gravar({token:d.access_token, refresh:d.refresh_token, email:(d.user&&d.user.email)||s.email});
  return true;
}

// Chamada à API de dados. Renova a sessão sozinha se o acesso expirar.
async function api(caminho, opcoes, jaRenovou){
  opcoes = opcoes || {};
  const s = Sessao.ler();
  const cab = {
    'apikey':SUPABASE_KEY,
    'Authorization':'Bearer '+((s&&s.token)||SUPABASE_KEY),
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  };
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+caminho, {
    method:opcoes.method||'GET',
    headers:cab,
    body:opcoes.body
  });
  if(r.status===401 && !jaRenovou){
    if(await renovarSessao()) return api(caminho, opcoes, true);
    Sessao.limpar(); mostrarLogin('Sessão expirada. Entre novamente.');
    throw new Error('Sessão expirada');
  }
  if(!r.ok){
    const t = await r.text();
    throw new Error('Erro ao salvar: '+t.slice(0,140));
  }
  if(r.status===204) return null;
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

// ============================================================
//  DADOS
// ============================================================
let movimentos=[], produtos=[], contas=[];
let offline=false;

function guardarCopia(){
  try{ localStorage.setItem('copia', JSON.stringify({movimentos:movimentos,produtos:produtos,contas:contas})) }catch(e){}
}
function carregarCopia(){
  try{
    const c=JSON.parse(localStorage.getItem('copia'));
    if(c){ movimentos=c.movimentos||[]; produtos=c.produtos||[]; contas=c.contas||[]; return true; }
  }catch(e){}
  return false;
}

async function carregarTudo(){
  try{
    const res = await Promise.all([
      api('movimentos?select=*&order=data_hora.desc'),
      api('produtos?select=*&order=descricao.asc'),
      api('contas?select=*&order=vencimento.asc')
    ]);
    movimentos = (res[0]||[]).map(function(x){ return {id:x.id, ts:new Date(x.data_hora).getTime(), tipo:x.tipo, categoria:x.categoria, valor:Number(x.valor), desc:x.descricao, criadoEm:x.criado_em?new Date(x.criado_em).getTime():null}; });
    produtos   = (res[1]||[]).map(function(x){ return {id:x.id, desc:x.descricao, codigo:x.codigo_barras||'', estoque:Number(x.estoque), minimo:Number(x.estoque_minimo), validade:x.validade}; });
    contas     = (res[2]||[]).map(function(x){ return {id:x.id, tipo:x.tipo, desc:x.descricao, valor:Number(x.valor), venc:x.vencimento, status:x.status, linha:x.linha_digitavel||''}; });
    offline=false; guardarCopia();
  }catch(e){
    if(String(e.message).indexOf('Sessão')>=0) throw e;
    if(carregarCopia()){ offline=true; }
    else throw e;
  }
}

// ============================================================
// Lê valores no formato brasileiro com segurança:
// "1.771,19" -> 1771.19 | "177119" -> 177119 | "1771,19" -> 1771.19
// "1.771" -> 1771 (ponto de milhar) | "1771.19" -> 1771.19 (ponto decimal)
function parseValor(txt){
  let s=String(txt==null?'':txt).trim().replace(/[^\d.,]/g,'');
  if(!s) return NaN;
  if(s.indexOf(',')>=0){
    s=s.replace(/\./g,'').replace(',','.');            // vírgula é o decimal
  }else{
    const p=s.split('.');
    if(p.length>2) s=p.join('');                        // 1.234.567
    else if(p.length===2 && p[1].length===3) s=p.join(''); // 1.771 = milhar
  }
  const n=parseFloat(s);
  return isNaN(n)?NaN:n;
}
function brl(n){ return Number(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function comHora(d){ return String(d).length===10 ? d+'T12:00:00' : d; }
function dm(d){ return new Date(comHora(d)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function inicioDia(d){ d=d||new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); }
const CATS={ENTRADA:['Venda','Suprimento','Outros'],SAIDA:['Distribuidor','Imposto','Retirada','Compras','Fornecedor','Sangria','Luz','Água','Aluguel','Salário','Outros']};
function somaMov(tipo,desde,ate,categoria){ return movimentos.filter(function(m){ return m.tipo===tipo&&m.ts>=desde&&m.ts<ate&&(!categoria||m.categoria===categoria); }).reduce(function(s,m){ return s+m.valor; },0); }
function resumoVendas(){ const d0=inicioDia(),am=d0+86400000,s0=am-7*86400000,m0=new Date(new Date().getFullYear(),new Date().getMonth(),1).getTime(); return {dia:somaMov('ENTRADA',d0,am,'Venda'),semana:somaMov('ENTRADA',s0,am,'Venda'),mes:somaMov('ENTRADA',m0,am,'Venda')}; }
function saldoDia(){ const d0=inicioDia(),am=d0+86400000; return {ent:somaMov('ENTRADA',d0,am),sai:somaMov('SAIDA',d0,am)}; }
function estoqueDe(p){ return Number(p.estoque||0); }
function diasAte(d){ return Math.round((new Date(comHora(d))-new Date())/86400000); }
function statusValidade(v){ if(!v)return null; const dias=diasAte(v); if(dias<0)return {t:'Vencido',c:'var(--rose)',bg:'#FDECEC'}; if(dias<=30)return {t:'Vence em '+dias+'d',c:'var(--amber)',bg:'#FEF3D9'}; return {t:'Val. '+dm(v),c:'var(--muted)',bg:'#EEF2F0'}; }
function contasOrd(tipo){ return contas.filter(function(c){ return c.tipo===tipo; }).sort(function(a,b){ return new Date(a.venc)-new Date(b.venc); }); }
function alertas(){
  const baixo=produtos.filter(function(p){ return Number(p.minimo||0)>0&&estoqueDe(p)<Number(p.minimo); }).length;
  const venc=produtos.filter(function(p){ return p.validade&&diasAte(p.validade)<0&&estoqueDe(p)>0; }).length;
  const cp=contas.filter(function(c){ return c.tipo==='PAGAR'&&c.status!=='PAGO'&&diasAte(c.venc)<=7; });
  return {baixo:baixo,venc:venc,contas:cp.length,contasTotal:cp.reduce(function(s,c){ return s+c.valor; },0),proxima:contasOrd('PAGAR').filter(function(c){ return c.status!=='PAGO'; })[0]};
}
const BASE_VENC=Date.UTC(1997,9,7);
// Linha digitável (47 dígitos)
function decodificarLinha(linha){ const d=String(linha).replace(/\D/g,''); if(d.length!==47)return null; const fator=parseInt(d.slice(33,37),10); const venc=fator>0?new Date(BASE_VENC+fator*86400000):null; const c=parseInt(d.slice(37,47),10); return {valor:isNaN(c)?null:c/100,vencimento:venc}; }
// Código de barras do boleto (44 dígitos)
function decodificarCodigoBarras(cb){ const d=String(cb).replace(/\D/g,''); if(d.length!==44)return null; const fator=parseInt(d.slice(5,9),10); const venc=fator>0?new Date(BASE_VENC+fator*86400000):null; const c=parseInt(d.slice(9,19),10); return {valor:isNaN(c)?null:c/100,vencimento:venc}; }

// Lê a FOTO do boleto e extrai valor e vencimento pelo código de barras.
// A foto NÃO é guardada — serve só para a leitura.
async function lerBoletoDaFoto(arquivo){
  if(!('BarcodeDetector' in window)){
    throw new Error('Este navegador não lê código de barras. Use o Chrome no Android, ou digite a linha do boleto.');
  }
  let formatos=['itf','code_128','codabar','code_39'];
  try{
    const suportados=await BarcodeDetector.getSupportedFormats();
    formatos=formatos.filter(function(f){ return suportados.indexOf(f)>=0; });
    if(!formatos.length) formatos=suportados;
  }catch(e){}
  const detector=new BarcodeDetector({formats:formatos});
  const img=await createImageBitmap(arquivo);
  const codigos=await detector.detect(img);
  if(img.close) img.close();
  for(let i=0;i<codigos.length;i++){
    const d=String(codigos[i].rawValue||'').replace(/\D/g,'');
    if(d.length===44){ const r=decodificarCodigoBarras(d); if(r) return r; }
    if(d.length===47){ const r=decodificarLinha(d); if(r) return r; }
  }
  throw new Error('Não encontrei o código de barras. Aproxime mais, com boa luz, e enquadre só a faixa de barras.');
}

function mostrarLogin(msg){
  document.getElementById('raiz').innerHTML=
    '<div id="login">'+
      '<div style="text-align:center;margin-bottom:22px">'+
        '<div class="marca" style="width:56px;height:56px;font-size:30px;margin:0 auto 14px">℞</div>'+

function alertaCard(icon,cor,bg,titulo,sub,valor,onclick){
  return '<div class="item" style="cursor:pointer" onclick="'+onclick+'">'+

    (valor?'<div class="val2">'+valor+'</div>':'')+'</div>';

function hojeISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// Monta o horário do lançamento: se for hoje, usa a hora atual; se for
// retroativo, usa meio-dia daquele dia.
function montarDataHora(dataISO){
  if(!dataISO || dataISO===hojeISO()) return new Date().toISOString();
  return new Date(dataISO+'T12:00:00').toISOString();
}
// Formata o campo enquanto a pessoa digita, preenchendo vírgula e
// ponto sozinho. Os dígitos entram pelos centavos, da direita para a
// esquerda: 1 -> 0,01 | 177 -> 1,77 | 177119 -> 1.771,19
function mascaraMoeda(el){
  let d=String(el.value).replace(/\D/g,'').replace(/^0+/,'');
  if(!d){ el.value=''; return; }
  if(d.length>11) d=d.slice(0,11);            // limite de segurança
  const n=parseInt(d,10)/100;
  el.value=n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
// Preenche um campo de valor já formatado (usado pelo boleto)
function porValorNoCampo(id,valor){
  const el=document.getElementById(id); if(!el) return;
  el.value=Number(valor).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function previa(idCampo,idAviso){
  const el=document.getElementById(idAviso); if(!el) return;
  const v=parseValor(document.getElementById(idCampo).value);
  el.textContent = isNaN(v)||v===0 ? '' : 'Será lançado: '+brl(v);
}
// Lançamentos podem ser corrigidos ou apagados por até 72h após serem feitos.
const PRAZO_EDICAO=72*3600*1000;
function podeEditar(m){
  if(!m.criadoEm) return true;
  return (Date.now()-m.criadoEm) < PRAZO_EDICAO;
}
function horasRestantes(m){
  if(!m.criadoEm) return null;
  const resta=PRAZO_EDICAO-(Date.now()-m.criadoEm);
  if(resta<=0) return 0;
  return Math.ceil(resta/3600000);
}
let editTipo='ENTRADA',editCat='Venda';

  editTipo=m.tipo; editCat=m.categoria||CATS[m.tipo][0];
  const dataISO=new Date(m.ts).getFullYear()+'-'+String(new Date(m.ts).getMonth()+1).padStart(2,'0')+'-'+String(new Date(m.ts).getDate()).padStart(2,'0');

    '<label class="campo">Valor</label><input id="ev" inputmode="numeric" oninput="mascaraMoeda(this);previa(\'ev\',\'ePrev\')" value="'+m.valor.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'"/>'+
    '<div id="ePrev" class="previa"></div>'+

    '<label class="campo">Data</label><input id="edata" type="date" value="'+dataISO+'"/>'+
    '<div class="dica">Pode ser corrigido por mais '+(h!=null?h+'h':'algum tempo')+'.</div>'+

// ============================================================
// Um lançamento só pode ser editado ou apagado nas primeiras 72 horas
// depois de criado. Depois disso, o histórico fica travado.
const PRAZO_EDICAO_MS = 72*3600000;
function podeEditar(m){
  if(!m.criadoEm) return true;              // lançamentos antigos sem registro
  return (Date.now()-m.criadoEm) < PRAZO_EDICAO_MS;
}
function horasRestantes(m){
  if(!m.criadoEm) return null;
  const resta=PRAZO_EDICAO_MS-(Date.now()-m.criadoEm);
  if(resta<=0) return 0;
  const h=Math.floor(resta/3600000);
  return h<1 ? '<1' : h;
}
let caixaData='';
function vCaixa(){
  if(!caixaData) caixaData=hojeISO();
  const d0=new Date(caixaData+'T00:00:00').getTime(), am=d0+86400000;
  const ent=somaMov('ENTRADA',d0,am), sai=somaMov('SAIDA',d0,am);
  const doDia=movimentos.filter(function(m){ return m.ts>=d0&&m.ts<am; }).sort(function(a,b){ return b.ts-a.ts; });
  const ehHoje = caixaData===hojeISO();
  return '<div><label class="campo" style="margin-top:0">Dia</label><input type="date" value="'+caixaData+'" onchange="caixaData=this.value;render()"/></div>'+
    '<div class="duo">'+
      '<div class="mini"><div class="l">Entradas</div><div class="v" style="color:var(--emerald)">'+brl(ent)+'</div></div>'+
      '<div class="mini"><div class="l">Saídas</div><div class="v" style="color:var(--rose)">'+brl(sai)+'</div></div>'+
      '<div class="mini"><div class="l">Saldo</div><div class="v">'+brl(ent-sai)+'</div></div>'+
    '</div>'+
    '<h2 class="sec">Movimentos '+(ehHoje?'de hoje':'de '+dm(caixaData))+'</h2>'+
    (doDia.length?doDia.map(function(m){ const e=m.tipo==='ENTRADA'; const ed=podeEditar(m); return '<div class="item"'+(ed?' style="cursor:pointer" onclick="abrirEditar(\''+m.id+'\')"':'')+'>'+
      '<div class="iconC" style="background:'+(e?'#E7F6EF':'#FDECEC')+';color:'+(e?'var(--emerald)':'var(--rose)')+'">'+(e?IC.up:IC.down)+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:500">'+(m.desc||m.categoria||'Lançamento')+'</div><div style="font-size:11.5px;color:var(--muted)">'+(m.categoria||'')+' · '+new Date(m.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div></div>'+
      '<div style="text-align:right"><div class="val2" style="color:'+(e?'var(--emerald)':'var(--rose)')+'">'+(e?'+':'−')+' '+brl(m.valor)+'</div>'+
      (ed?'<div style="font-size:10.5px;color:var(--muted);margin-top:2px">toque para corrigir</div>':'<div style="font-size:10.5px;color:var(--muted);margin-top:2px">prazo encerrado</div>')+'</div></div>'; }).join('')
      :'<div class="vazio">Nenhum lançamento neste dia. Toque em + para adicionar.</div>');
}

async function salvarProduto(){

  const b=document.getElementById('pBtn'); b.textContent='Salvando…'; b.disabled=true;

    await api('produtos',{method:'POST',body:JSON.stringify({
      descricao:desc,
      codigo_barras:document.getElementById('pc').value.replace(/\D/g,'')||null,
      estoque:Number(document.getElementById('pe').value||0),
      estoque_minimo:Number(document.getElementById('pm').value||0),
      validade:document.getElementById('pv').value||null
    })});
    fecharFolha(); await recarregar();
  }catch(e){ alert(e.message); b.textContent='Salvar produto'; b.disabled=false; }
}
let meTipo='ENTRA';
function abrirMovEstoque(id){
  const p=produtos.filter(function(x){return x.id===id})[0]; if(!p)return;
  abrirFolha('Movimentar: '+p.desc,
    '<div class="toggle" id="meT">'+
      '<button style="background:var(--emerald);color:#fff" onclick="meTipo=\'ENTRA\';document.querySelectorAll(\'#meT button\').forEach(function(b,i){b.style.background=i===0?\'var(--emerald)\':\'transparent\';b.style.color=i===0?\'#fff\':\'var(--muted)\'})">Entrada</button>'+
      '<button onclick="meTipo=\'SAI\';document.querySelectorAll(\'#meT button\').forEach(function(b,i){b.style.background=i===1?\'var(--rose)\':\'transparent\';b.style.color=i===1?\'#fff\':\'var(--muted)\'})">Saída/Perda</button>'+
    '</div>'+
    '<label class="campo">Quantidade</label><input id="meq" inputmode="numeric" placeholder="0"/>'+
    '<button class="primario" id="meBtn">Confirmar</button>',
    function(){ meTipo='ENTRA'; document.getElementById('meq').focus(); document.getElementById('meBtn').onclick=function(){ salvarMovEstoque(id); }; });
}
async function salvarMovEstoque(id){
  const p=produtos.filter(function(x){return x.id===id})[0];
  const q=Number(document.getElementById('meq').value||0); if(!q)return;
  const novo=Math.max(0,Number(p.estoque||0)+(meTipo==='ENTRA'?q:-q));
  const b=document.getElementById('meBtn'); b.textContent='Salvando…'; b.disabled=true;
  try{
    await api('produtos?id=eq.'+id,{method:'PATCH',body:JSON.stringify({estoque:novo})});
    fecharFolha(); await recarregar();
  }catch(e){ alert(e.message); b.textContent='Confirmar'; b.disabled=false; }
}
function importarXml(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=async function(){
    try{
      const xml=new DOMParser().parseFromString(r.result,'text/xml');
      const dets=xml.getElementsByTagName('det');
      if(!dets.length){ alert('Nenhum item encontrado no XML.'); return; }
      let add=0;
      for(let i=0;i<dets.length;i++){
        const det=dets[i];
        const g=function(t){ const el=det.getElementsByTagName(t)[0]; return el?el.textContent:null; };
        const desc=g('xProd'); if(!desc)continue;
        const qtd=Number(g('qCom')||0);
        const ean=g('cEAN'); const cod=(ean&&ean!=='SEM GTIN')?ean:null;
        const rastro=det.getElementsByTagName('rastro')[0];
        const valEl=rastro?rastro.getElementsByTagName('dVal')[0]:null;
        const val=valEl?valEl.textContent:null;
        const ex=produtos.filter(function(x){ return (cod&&x.codigo===cod)||x.desc.toLowerCase()===desc.toLowerCase(); })[0];
        if(ex){
          const corpo={estoque:Number(ex.estoque||0)+qtd};
          if(val&&!ex.validade) corpo.validade=val;
          await api('produtos?id=eq.'+ex.id,{method:'PATCH',body:JSON.stringify(corpo)});
        }else{
          await api('produtos',{method:'POST',body:JSON.stringify({descricao:desc,codigo_barras:cod,estoque:qtd,estoque_minimo:0,validade:val})});
        }
        add++;
      }
      await recarregar();
      alert(add+' itens importados da nota.');
    }catch(e){ alert('Não consegui importar: '+e.message); }
  };
  r.readAsText(f);
}

let contaAba='PAGAR';
function vContas(){
  const lista=contasOrd(contaAba);
  return '<div class="toggle">'+
      '<button style="'+(contaAba==='PAGAR'?'background:var(--pine);color:#fff':'')+'" onclick="contaAba=\'PAGAR\';render()">A pagar</button>'+
      '<button style="'+(contaAba==='RECEBER'?'background:var(--pine);color:#fff':'')+'" onclick="contaAba=\'RECEBER\';render()">A receber</button>'+
    '</div>'+
    (lista.length?lista.map(function(c){
      const dias=diasAte(c.venc);
      const st=c.status==='PAGO'?{t:(contaAba==='PAGAR'?'Pago':'Recebido'),c:'var(--emerald)',bg:'#E7F6EF'}
        :dias<0?{t:'Atrasado',c:'var(--rose)',bg:'#FDECEC'}
        :dias<=3?{t:'Vence em '+dias+'d',c:'var(--amber)',bg:'#FEF3D9'}
        :{t:'Vence '+dm(c.venc),c:'var(--muted)',bg:'#EEF2F0'};
      return '<div class="item"><div style="flex:1"><div style="font-size:14px;font-weight:500">'+c.desc+'</div>'+
        '<div style="margin-top:6px"><span class="tag" style="color:'+st.c+';background:'+st.bg+'">'+st.t+'</span></div></div>'+
        '<div style="text-align:right"><div class="val2" style="font-size:16px">'+brl(c.valor)+'</div>'+
        (c.status!=='PAGO'?'<button class="pagarBtn" onclick="quitar(\''+c.id+'\')">'+(contaAba==='PAGAR'?'Marcar pago':'Marcar recebido')+'</button>':'')+
        '<button class="lixo" onclick="apagarConta(\''+c.id+'\')" style="margin-top:4px">'+IC.lixo+'</button></div></div>';
    }).join(''):'<div class="vazio">Nenhuma conta '+(contaAba==='PAGAR'?'a pagar':'a receber')+'. Toque em + para adicionar.</div>');
}
function abrirConta(){
  const pagar=contaAba==='PAGAR';
  abrirFolha(pagar?'Adicionar conta a pagar':'Adicionar conta a receber',
    (pagar?'<label class="foto"><span>'+IC.camera+' Ler boleto por foto</span><input type="file" accept="image/*" capture="environment" onchange="fotoBoleto(event)" style="display:none"/></label><div id="cFoto" class="dica" style="margin:8px 0 2px"></div>':'')+
    '<label class="campo">'+(pagar?'Distribuidor / descrição':'Cliente / descrição')+'</label><input id="cd" placeholder="'+(pagar?'Ex: Itafarma':'Ex: Convênio X')+'"/>'+
    (pagar?'<label class="campo">Linha digitável (opcional — preenche valor e vencimento)</label><input id="cl" inputmode="numeric" oninput="autoLinha()" placeholder="Números do boleto"/>':'')+
    '<label class="campo">Valor</label><input id="cv" inputmode="numeric" placeholder="0,00" oninput="mascaraMoeda(this);previa(\'cv\',\'cPrev\')"/><div id="cPrev" class="previa"></div>'+
    '<label class="campo">Vencimento</label><input id="cvenc" type="date"/>'+
    (pagar?'<div class="dica">Dica: digitando a linha do boleto, o valor e o vencimento aparecem sozinhos.</div>':'')+
    '<button class="primario" id="cBtn">Salvar</button>',
    function(){ document.getElementById('cd').focus(); document.getElementById('cBtn').onclick=salvarConta; });
}
async function fotoBoleto(ev){
  const arq=ev.target.files[0]; if(!arq)return;
  const aviso=document.getElementById('cFoto');
  aviso.innerHTML='<span class="girando">◜</span> Lendo o boleto…';
  aviso.style.color='var(--muted)';
  try{
    const r=await lerBoletoDaFoto(arq);
    if(r.valor!=null){ porValorNoCampo('cv',r.valor); previa('cv','cPrev'); }
    if(r.vencimento) document.getElementById('cvenc').value=r.vencimento.toISOString().slice(0,10);
    aviso.textContent='Lido: '+brl(r.valor)+(r.vencimento?' · vence '+dm(r.vencimento.toISOString().slice(0,10)):'')+'. Confira e informe o distribuidor.';
    aviso.style.color='var(--emerald)';
  }catch(e){
    aviso.textContent=e.message;
    aviso.style.color='var(--rose)';
  }
  ev.target.value='';
}
function autoLinha(){
  const d=decodificarLinha(document.getElementById('cl').value);
  if(d){
    if(d.valor!=null){ porValorNoCampo('cv',d.valor); previa('cv','cPrev'); }
    if(d.vencimento)document.getElementById('cvenc').value=d.vencimento.toISOString().slice(0,10);
  }
}
async function salvarConta(){
  const v=parseValor(document.getElementById('cv').value);
  const venc=document.getElementById('cvenc').value;
  if(!v||!venc){alert('Informe valor e vencimento.');return;}
  const el=document.getElementById('cl');
  const b=document.getElementById('cBtn'); b.textContent='Salvando…'; b.disabled=true;
  try{
    await api('contas',{method:'POST',body:JSON.stringify({
      tipo:contaAba,
      descricao:document.getElementById('cd').value.trim()||(contaAba==='PAGAR'?'Conta':'Recebimento'),
      valor:v, vencimento:venc, status:'PENDENTE',
      linha_digitavel:(el&&el.value.replace(/\D/g,''))||null
    })});
    fecharFolha(); await recarregar();
  }catch(e){ alert(e.message); b.textContent='Salvar'; b.disabled=false; }
}
async function quitar(id){
  const c=contas.filter(function(x){return x.id===id})[0]; if(!c)return;
  try{
    await api('contas?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:'PAGO',data_baixa:new Date().toISOString()})});
    await api('movimentos',{method:'POST',body:JSON.stringify({
      tipo:c.tipo==='PAGAR'?'SAIDA':'ENTRADA',
      categoria:c.tipo==='PAGAR'?'Distribuidor':'Outros',
      valor:c.valor,
      descricao:(c.tipo==='PAGAR'?'Pgto: ':'Receb.: ')+c.desc
    })});
    await recarregar();
  }catch(e){ alert(e.message); }
}
async function apagarConta(id){
  if(!confirm('Apagar esta conta?'))return;
  try{ await api('contas?id=eq.'+id,{method:'DELETE'}); await recarregar(); }catch(e){ alert(e.message); }
}

// ============================================================
//  RELATÓRIOS
// ============================================================
let relPeriodo='semanal',relDe='',relAte='';
function intervalo(){
  const d0=inicioDia(),am=d0+86400000;
  if(relPeriodo==='diario')return[d0,am];
  if(relPeriodo==='semanal')return[am-7*86400000,am];
  if(relPeriodo==='mensal')return[new Date(new Date().getFullYear(),new Date().getMonth(),1).getTime(),am];
  if(relPeriodo==='custom'&&relDe&&relAte)return[new Date(relDe+'T00:00:00').getTime(),new Date(relAte+'T00:00:00').getTime()+86400000];
  return null;
}
function vRel(){
  const per=[['diario','Diário'],['semanal','Semanal'],['mensal','Mensal'],['custom','Período']];
  const iv=intervalo();
  let corpo='';
  if(!iv) corpo='<div class="vazio">Selecione as datas do período.</div>';
  else{
    const ent=somaMov('ENTRADA',iv[0],iv[1]),sai=somaMov('SAIDA',iv[0],iv[1]);
    corpo='<section class="item" style="display:block">'+
      '<div style="font-size:12px;color:var(--muted)">Saldo do período</div>'+
      '<div class="val2" style="font-size:24px">'+brl(ent-sai)+'</div>'+
      '<div style="display:flex;gap:16px;margin-top:8px;font-size:13px"><span style="color:var(--emerald)">▲ Entradas '+brl(ent)+'</span><span style="color:var(--rose)">▼ Saídas '+brl(sai)+'</span></div>'+
    '</section>'+
    '<button class="btnS" style="width:100%" onclick="exportarCsv()">'+IC.baixar+' Exportar em CSV (Excel)</button>';
  }
  return '<div class="chips">'+per.map(function(p){ return '<button class="chip '+(relPeriodo===p[0]?'on':'')+'" onclick="relPeriodo=\''+p[0]+'\';render()">'+p[1]+'</button>'; }).join('')+'</div>'+
    (relPeriodo==='custom'?'<div class="duo"><div style="flex:1"><label class="campo">De</label><input type="date" value="'+relDe+'" onchange="relDe=this.value;render()"/></div><div style="flex:1"><label class="campo">Até</label><input type="date" value="'+relAte+'" onchange="relAte=this.value;render()"/></div></div>':'')+
    corpo;
}
function exportarCsv(){
  const iv=intervalo(); if(!iv)return;
  const linhas=[['Data','Hora','Tipo','Categoria','Descricao','Valor']];
  movimentos.filter(function(m){ return m.ts>=iv[0]&&m.ts<iv[1]; }).sort(function(a,b){ return a.ts-b.ts; }).forEach(function(m){
    const d=new Date(m.ts);
    linhas.push([d.toLocaleDateString('pt-BR'),d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),m.tipo,m.categoria||'',(m.desc||'').replace(/;/g,','),m.valor.toFixed(2)]);
  });
  const ent=somaMov('ENTRADA',iv[0],iv[1]),sai=somaMov('SAIDA',iv[0],iv[1]);
  linhas.push([]);
  linhas.push(['','','','','TOTAL ENTRADAS',ent.toFixed(2)]);
  linhas.push(['','','','','TOTAL SAIDAS',sai.toFixed(2)]);
  linhas.push(['','','','','SALDO',(ent-sai).toFixed(2)]);
  const csv='\uFEFF'+linhas.map(function(l){ return l.join(';'); }).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='relatorio-'+relPeriodo+'.csv'; a.click();
}

function abrirFolha(titulo,html,apos){
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='overlay';
  ov.onclick=function(e){ if(e.target===ov) fecharFolha(); };
  ov.innerHTML='<div class="folha"><div class="folhaTopo"><span class="folhaTitulo">'+titulo+'</span><button class="fechar" onclick="fecharFolha()">✕</button></div>'+html+'</div>';
  document.body.appendChild(ov); if(apos) apos();
}
function fecharFolha(){ const o=document.getElementById('overlay'); if(o) o.remove(); }
